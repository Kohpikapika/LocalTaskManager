<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tasks</title>
</head>
<body>
  <h1>Task List</h1>
  <ul id="list"></ul>

  <script>
    fetch("http://localhost:3000/tasks")
      .then(res => res.json())
      .then(data => {
        const ul = document.getElementById("list");
        data.forEach(todo => {
          const li = document.createElement("li");
          li.textContent = todo.title;
          ul.appendChild(li);
        });
      });
  </script>
</body>
</html>
